{% extends "base.html" %}

{% block content %}
<h2>Download Reports</h2>

<!-- Filters -->
<div style="margin:20px 0; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
    <select id="year" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
        <option value="">All Years</option>
        {% for y in years %}
        <option value="{{ y }}">{{ y }}</option>
        {% endfor %}
    </select>

    <select id="session" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
        <option value="">All Sessions</option>
        {% for s in sessions %}
        <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
    </select>

    <select id="center" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
        <option value="">All Centers</option>
        <option value="inderlok">Inderlok</option>
        <option value="janakpuri">Janakpuri</option>
        <option value="karkardooma">Karkardooma</option>
    </select>

    <button onclick="clearFilters()" style="padding:8px 15px; background:#f44336; color:white; border:none; border-radius:4px;">Clear</button>
    <span id="loader" style="display:none; color:#1976d2;">Loading...</span>
</div>

<!-- Table -->
<div style="overflow-x:auto;">
    <table border="1" style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead style="background:#1976d2; color:white;">
            <tr>
                <th>Category</th><th>Course</th><th>Center</th><th>Session</th>
                <th colspan="3">GENERAL</th><th colspan="3">OBC</th><th colspan="3">SC</th><th colspan="3">ST</th><th colspan="3">PWD</th>
            </tr>
            <tr>
                <th colspan="4"></th>
                <th>T</th><th>C</th><th>P</th><th>T</th><th>C</th><th>P</th><th>T</th><th>C</th><th>P</th><th>T</th><th>C</th><th>P</th><th>T</th><th>C</th><th>P</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="19" style="text-align:center;">Loading...</td></tr>
        </tbody>
        <tfoot id="tfoot"></tfoot>
    </table>
</div>

<!-- Export & Total -->
<div style="margin:20px 0; display:flex; gap:20px; align-items:center;">
    <button onclick="exportExcel()" style="padding:8px 20px; background:green; color:white; border:none; border-radius:4px;">Export Excel</button>
    <span id="total" style="font-weight:bold;">Total: 0</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadData();
    
    document.getElementById("year").addEventListener("change", loadData);
    document.getElementById("session").addEventListener("change", loadData);
    document.getElementById("center").addEventListener("change", loadData);
});

function loadData() {
    let year = document.getElementById("year").value;
    let session = document.getElementById("session").value;
    let center = document.getElementById("center").value;
    
    document.getElementById("loader").style.display = "inline";
    document.getElementById("tbody").innerHTML = '<tr><td colspan="19" style="text-align:center;">Loading...</td></tr>';
    
    let url = new URL('/api/download-data/', window.location.origin);
    if(year) url.searchParams.append('year', year);
    if(session) url.searchParams.append('session', session);
    if(center) url.searchParams.append('center', center);
    
    fetch(url)
    .then(response => {
        if(!response.ok) throw new Error('Network error');
        return response.json();
    })
    .then(data => {
        displayData(data.results);
        document.getElementById("loader").style.display = "none";
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById("tbody").innerHTML = '<tr><td colspan="19" style="text-align:center; color:red;">Error loading data</td></tr>';
        document.getElementById("tfoot").innerHTML = '';
        document.getElementById("total").innerText = 'Total: 0';
        document.getElementById("loader").style.display = "none";
    });
}

function displayData(results) {
    let tbody = document.getElementById("tbody");
    let tfoot = document.getElementById("tfoot");
    let totalSpan = document.getElementById("total");
    
    if(!results || results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="19" style="text-align:center;">No data found</td></tr>';
        tfoot.innerHTML = '';
        totalSpan.innerText = 'Total: 0';
        return;
    }
    
    // Group data
    let groups = {};
    let totals = {
        GENERAL: {t:0, c:0, p:0},
        OBC: {t:0, c:0, p:0},
        SC: {t:0, c:0, p:0},
        ST: {t:0, c:0, p:0},
        PWD: {t:0, c:0, p:0},
        all: 0
    };
    
    results.forEach(row => {
        let key = row.course_category + '|' + row.course_name + '|' + row.center_name + '|' + row.session;
        
        if(!groups[key]) {
            groups[key] = {
                cat: row.course_category,
                course: row.course_name,
                center: row.center_name,
                session: row.session,
                GENERAL: {t:0, c:0, p:0},
                OBC: {t:0, c:0, p:0},
                SC: {t:0, c:0, p:0},
                ST: {t:0, c:0, p:0},
                PWD: {t:0, c:0, p:0}
            };
        }
        
        let caste = row.caste_category; // Should be GENERAL, OBC, SC, ST, PWD
        if (groups[key][caste]) { // Ensure property exists
            if(row.trained) {
                groups[key][caste].t++;
                totals[caste].t++;
            }
            if(row.certified) {
                groups[key][caste].c++;
                totals[caste].c++;
            }
            if(row.placed) {
                groups[key][caste].p++;
                totals[caste].p++;
            }
            totals.all++;
        } else {
            console.warn('Unknown caste:', caste);
        }
    });
    
    // Build rows
    let html = '';
    Object.values(groups).forEach(g => {
        html += `<tr>
            <td>${g.cat}</td>
            <td>${g.course}</td>
            <td>${g.center}</td>
            <td>${g.session}</td>
            <td>${g.GENERAL.t}</td><td>${g.GENERAL.c}</td><td>${g.GENERAL.p}</td>
            <td>${g.OBC.t}</td><td>${g.OBC.c}</td><td>${g.OBC.p}</td>
            <td>${g.SC.t}</td><td>${g.SC.c}</td><td>${g.SC.p}</td>
            <td>${g.ST.t}</td><td>${g.ST.c}</td><td>${g.ST.p}</td>
            <td>${g.PWD.t}</td><td>${g.PWD.c}</td><td>${g.PWD.p}</td>
        </tr>`;
    });
    
    tbody.innerHTML = html;
    
    // Footer
    tfoot.innerHTML = `<tr style="background:#e3f2fd; font-weight:bold;">
        <td colspan="4">TOTAL</td>
        <td>${totals.GENERAL.t}</td><td>${totals.GENERAL.c}</td><td>${totals.GENERAL.p}</td>
        <td>${totals.OBC.t}</td><td>${totals.OBC.c}</td><td>${totals.OBC.p}</td>
        <td>${totals.SC.t}</td><td>${totals.SC.c}</td><td>${totals.SC.p}</td>
        <td>${totals.ST.t}</td><td>${totals.ST.c}</td><td>${totals.ST.p}</td>
        <td>${totals.PWD.t}</td><td>${totals.PWD.c}</td><td>${totals.PWD.p}</td>
    </tr>`;
    
    totalSpan.innerText = 'Total: ' + totals.all;
}

function clearFilters() {
    document.getElementById("year").value = "";
    document.getElementById("session").value = "";
    document.getElementById("center").value = "";
    loadData();
}

function exportExcel() {
    let table = document.querySelector('table');
    let html = table.outerHTML;
    let blob = new Blob([html], {type: 'application/vnd.ms-excel'});
    let link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'report.xls';
    link.click();
}
</script>
{% endblock %}
